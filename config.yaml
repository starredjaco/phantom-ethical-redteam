# ================== CONFIGURATION PHANTOM ==================
#
# provider: anthropic | openai | grok | gemini | ollama | mistral | deepseek
provider: "anthropic"

# model: leave empty to use the provider's default (as of 2026-03-15)
#   anthropic -> claude-sonnet-4-6
#   openai    -> gpt-5.4
#   grok      -> grok-4-20-beta
#   gemini    -> gemini-3.0-pro
#   ollama    -> deepseek-r1:3.2  (local)
#   mistral   -> mistral-large-latest
#   deepseek  -> deepseek-chat-v3.2
model: ""

# API key -- set via environment variable or generated by install.sh / install.ps1
api_key: ""

# Ollama only
ollama_host: "http://localhost:11434"

# Paths
log_dir: "logs"
scope_file: "scopes/current_scope.md"

# Behaviour
debug: true
autonomous: true
max_autonomous_turns: 50
pause_every_n_turns: 10

# Interactive mode
interactive: true

# Timeouts (seconds)
sqlmap_timeout: 300
nmap_timeout: 300

# Parallel tool execution
max_parallel_tools: 4

# Rate limiting for HTTP requests (requests/sec)
requests_per_second: 5

# Retry config for HTTP tools (recon, payloads)
retry_max: 3
retry_backoff: 2

# Context compaction -- tool results older than this many turns are truncated
context_compact_after: 5
